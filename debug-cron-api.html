<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Cron API</title>
</head>
<body>
    <h1>Debug Cron API Test</h1>
    <button onclick="testDirectAPI()">Test Direct Backend API (Port 3001)</button>
    <button onclick="testProxyAPI()">Test React Proxy API (Port 3004)</button>
    <button onclick="testReactComponent()">Test React Component Logic</button>
    <div id="results"></div>

    <script>
        async function testDirectAPI() {
            const results = document.getElementById('results');
            try {
                const response = await fetch('http://localhost:3001/api/cron/jobs');
                const data = await response.json();
                results.innerHTML = `
                    <h3>Direct Backend API (Port 3001)</h3>
                    <p>Success: ${data.success}</p>
                    <p>Jobs count: ${data.jobs?.length}</p>
                    <p>First job name: ${data.jobs?.[0]?.name}</p>
                    <pre>${JSON.stringify(data.jobs?.[0], null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `<h3>Error testing direct API:</h3><p>${error.message}</p>`;
            }
        }

        async function testProxyAPI() {
            const results = document.getElementById('results');
            try {
                const response = await fetch('/api/cron/jobs');
                const data = await response.json();
                results.innerHTML = `
                    <h3>React Proxy API</h3>
                    <p>Success: ${data.success}</p>
                    <p>Jobs count: ${data.jobs?.length}</p>
                    <p>First job name: ${data.jobs?.[0]?.name}</p>
                    <p>First job type: ${typeof data.jobs?.[0]?.name}</p>
                    <p>First job name truthy: ${!!data.jobs?.[0]?.name}</p>
                    <pre>${JSON.stringify(data.jobs?.[0], null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `<h3>Error testing proxy API:</h3><p>${error.message}</p>`;
            }
        }

        async function testReactComponent() {
            const results = document.getElementById('results');
            try {
                // Simulate React component logic
                const response = await fetch('/api/cron/jobs');
                const jobsResponse = await response.json();
                
                console.log('DEBUG: jobsResponse received:', jobsResponse);
                console.log('DEBUG: jobsResponse.jobs:', jobsResponse.jobs);
                
                let jobs = [];
                if (jobsResponse.success && jobsResponse.jobs) {
                    console.log('DEBUG: Setting real jobs data:', jobsResponse.jobs);
                    jobs = jobsResponse.jobs;
                } else {
                    console.warn('Failed to load jobs, using mock data');
                    jobs = []; // Mock fallback
                }
                
                // Test the filtering logic
                const filtered = jobs.filter(job => job != null);
                
                results.innerHTML = `
                    <h3>React Component Logic Test</h3>
                    <p>API Success: ${jobsResponse.success}</p>
                    <p>Has jobs property: ${jobsResponse.hasOwnProperty('jobs')}</p>
                    <p>Jobs type: ${typeof jobsResponse.jobs}</p>
                    <p>Jobs array: ${Array.isArray(jobsResponse.jobs)}</p>
                    <p>Jobs length: ${jobsResponse.jobs?.length}</p>
                    <p>Jobs after filter: ${filtered.length}</p>
                    <p>First filtered job name: ${filtered[0]?.name}</p>
                    <p>First filtered job name type: ${typeof filtered[0]?.name}</p>
                    <p>Name fallback test: ${filtered[0]?.name || 'Unknown'}</p>
                    <pre>${JSON.stringify(filtered[0], null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `<h3>Error testing React logic:</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
