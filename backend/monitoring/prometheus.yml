# Prometheus Configuration for LLM-Charge Platform Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'llm-charge'
    environment: 'production'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # LLM-Charge Backend Metrics
  - job_name: 'llm-charge-backend'
    static_configs:
      - targets: ['llm-charge-backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    params:
      format: ['prometheus']

  # LLM-Charge Frontend Metrics
  - job_name: 'llm-charge-frontend'
    static_configs:
      - targets: ['llm-charge-frontend:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis Metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-cache:6379']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Nginx Metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-proxy:80']
    metrics_path: '/nginx_status'
    scrape_interval: 30s

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Docker Container Metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
    scrape_interval: 30s

  # Custom Application Metrics
  - job_name: 'llm-charge-custom'
    static_configs:
      - targets: ['llm-charge-backend:8000']
    metrics_path: '/api/metrics'
    scrape_interval: 60s
    scrape_timeout: 30s
    params:
      format: ['prometheus']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: '(llm_charge_.*)'
        target_label: service
        replacement: 'llm-charge'

  # Health Check Monitoring
  - job_name: 'health-checks'
    static_configs:
      - targets: 
          - 'llm-charge-backend:8000'
          - 'llm-charge-frontend:3000'
          - 'redis-cache:6379'
    metrics_path: '/health'
    scrape_interval: 15s
    scrape_timeout: 5s