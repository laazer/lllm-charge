version: '3.8'

# Production-ready Docker Compose for LLM-Charge Platform
services:
  llm-charge-backend:
    build: 
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: llm-charge-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/llm-charge.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-100}
      - RATE_LIMIT=${RATE_LIMIT:-60}
      - WORKERS=${WORKERS:-4}
      - TIMEOUT=${TIMEOUT:-60}
    volumes:
      - llm_charge_data:/app/data
      - llm_charge_logs:/app/logs
      - llm_charge_uploads:/app/uploads
      - llm_charge_config:/app/config
    networks:
      - llm-charge-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

  llm-charge-frontend:
    build:
      context: ../
      dockerfile: Dockerfile.production
    container_name: llm-charge-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000}
    volumes:
      - llm_charge_frontend_cache:/app/.cache
    networks:
      - llm-charge-network
    depends_on:
      llm-charge-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  nginx-proxy:
    image: nginx:alpine
    container_name: llm-charge-proxy
    ports:
      - "${PROXY_PORT:-80}:80"
      - "${PROXY_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - llm_charge_proxy_logs:/var/log/nginx
    networks:
      - llm-charge-network
    depends_on:
      - llm-charge-backend
      - llm-charge-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  redis-cache:
    image: redis:7-alpine
    container_name: llm-charge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - llm_charge_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - llm-charge-network
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:-defaultpass}"]
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: llm-charge-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - llm_charge_prometheus_data:/prometheus
    networks:
      - llm-charge-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

networks:
  llm-charge-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  llm_charge_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}
  llm_charge_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LOGS_PATH:-./logs}
  llm_charge_uploads:
    driver: local
  llm_charge_config:
    driver: local
  llm_charge_frontend_cache:
    driver: local
  llm_charge_proxy_logs:
    driver: local
  llm_charge_redis_data:
    driver: local
  llm_charge_prometheus_data:
    driver: local