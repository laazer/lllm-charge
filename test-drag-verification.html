<!DOCTYPE html>
<html>
<head>
    <title>Drag Functionality Verification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .test-results { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🖱️ Workflow Editor Drag Functionality Verification</h1>
    <p>This page verifies that the workflow editor's drag functionality is working correctly.</p>
    
    <div id="test-results" class="test-results"></div>
    
    <button onclick="testDragImplementation()">Test Drag Implementation</button>
    <button onclick="openTestWorkflow()">Open Test Workflow</button>
    <button onclick="testWorkflowAPI()">Test Workflow API</button>
    
    <script>
        function addResult(message, type = 'info') {
            const results = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `${new Date().toLocaleTimeString()}: ${message}`;
            results.appendChild(div);
        }
        
        async function testDragImplementation() {
            addResult('🧪 Testing drag implementation in workflow-editor.html...', 'info');
            
            try {
                const response = await fetch('/workflow-editor.html');
                const html = await response.text();
                
                // Check for drag implementation elements
                const checks = [
                    { test: html.includes('addEventListener(\'mousedown\''), name: 'Mouse down event handler' },
                    { test: html.includes('onMouseMove'), name: 'Mouse move handler' },
                    { test: html.includes('onMouseUp'), name: 'Mouse up handler' },
                    { test: html.includes('requestAnimationFrame'), name: 'Performance optimization' },
                    { test: html.includes('style.transform'), name: 'CSS transform usage' },
                    { test: html.includes('updateConnections'), name: 'Real-time connection updates' },
                    { test: html.includes('isDragging'), name: 'Drag state tracking' },
                    { test: html.includes('deltaX') && html.includes('deltaY'), name: 'Position delta calculation' }
                ];
                
                let passed = 0;
                checks.forEach(check => {
                    if (check.test) {
                        addResult(`✅ ${check.name} - Found`, 'success');
                        passed++;
                    } else {
                        addResult(`❌ ${check.name} - Missing`, 'error');
                    }
                });
                
                addResult(`📊 Drag implementation check: ${passed}/${checks.length} components found`, 
                         passed === checks.length ? 'success' : 'error');
                         
            } catch (error) {
                addResult(`❌ Error testing drag implementation: ${error.message}`, 'error');
            }
        }
        
        async function testWorkflowAPI() {
            addResult('🧪 Testing workflow API for drag test workflow...', 'info');
            
            try {
                const workflowId = 'workflow-1774961922689-88obhidy9';
                const response = await fetch(`/api/workflows/${workflowId}`);
                
                if (response.ok) {
                    const workflow = await response.json();
                    addResult(`✅ Test workflow loaded: "${workflow.name}"`, 'success');
                    addResult(`📊 Nodes available: ${workflow.nodes.length}`, 'info');
                    
                    workflow.nodes.forEach((node, index) => {
                        addResult(`  Node ${index + 1}: "${node.name}" at (${node.position.x}, ${node.position.y})`, 'info');
                    });
                    
                    if (workflow.edges && workflow.edges.length > 0) {
                        addResult(`🔗 Connections: ${workflow.edges.length} edges between nodes`, 'info');
                    }
                } else {
                    addResult(`❌ Failed to load test workflow - ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ API test error: ${error.message}`, 'error');
            }
        }
        
        function openTestWorkflow() {
            addResult('🚀 Opening test workflow in workflow editor...', 'info');
            
            const workflowId = 'workflow-1774961922689-88obhidy9';
            const editorUrl = `/workflow-editor.html?id=${workflowId}`;
            
            window.open(editorUrl, '_blank');
            addResult(`✅ Test workflow opened: ${editorUrl}`, 'success');
            addResult('👆 Please manually test dragging nodes in the opened tab', 'info');
            addResult('1. Try clicking and dragging the "Drag Test Start" node', 'info');
            addResult('2. Verify connections update in real-time during drag', 'info');
            addResult('3. Check that other nodes can also be dragged', 'info');
        }
        
        // Auto-run drag implementation test on load
        window.addEventListener('load', () => {
            addResult('🏁 Drag Functionality Verification Started', 'info');
            setTimeout(() => testDragImplementation(), 500);
            setTimeout(() => testWorkflowAPI(), 1000);
        });
    </script>
</body>
</html>
