<!DOCTYPE html>
<html>
<head>
    <title>Debug: Minimal Node Creation Test</title>
    <style>
        .workflow-node {
            position: absolute;
            min-width: 200px;
            min-height: 80px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: move;
            user-select: none;
            z-index: 10;
            padding: 12px;
        }
        #workflow-canvas {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #ccc;
            background: #fafafa;
            margin: 20px 0;
        }
        .node-header {
            font-weight: bold;
            color: #1e293b;
        }
        .node-body {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 8px;
        }
        #debug-log {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Debug: Minimal Node Creation Test</h1>
    <div id="debug-log">
        <div><strong>Debug Log:</strong></div>
    </div>
    
    <div id="workflow-canvas"></div>
    
    <button onclick="testCreateNode()">Test Create Node</button>
    <button onclick="testWorkflowLoad()">Test Workflow Load</button>
    
    <script>
        const debugLog = document.getElementById('debug-log');
        
        function log(message) {
            const div = document.createElement('div');
            div.innerHTML = new Date().toLocaleTimeString() + ': ' + message;
            debugLog.appendChild(div);
            console.log(message);
        }
        
        // Minimal node creation test
        function testCreateNode() {
            log('Testing node creation...');
            
            const canvas = document.getElementById('workflow-canvas');
            log('Canvas element: ' + (canvas ? 'Found' : 'NOT FOUND'));
            
            if (!canvas) {
                log('❌ Canvas not found!');
                return;
            }
            
            log('Creating test node...');
            const nodeElement = document.createElement('div');
            nodeElement.className = 'workflow-node';
            nodeElement.style.left = '150px';
            nodeElement.style.top = '150px';
            nodeElement.innerHTML = `
                <div class="node-header">Test Node</div>
                <div class="node-body">This is a test node</div>
            `;
            
            log('Appending node to canvas...');
            canvas.appendChild(nodeElement);
            log('✅ Node created successfully');
            log('Canvas children count: ' + canvas.children.length);
        }
        
        // Test actual workflow loading
        async function testWorkflowLoad() {
            log('Testing workflow load...');
            
            try {
                const response = await fetch('/api/workflows/workflow-1774901129218-hhkcfof0q');
                if (!response.ok) throw new Error('API response not ok: ' + response.status);
                
                const workflow = await response.json();
                log('✅ Workflow loaded: ' + workflow.name);
                log('Node count: ' + (workflow.nodes ? workflow.nodes.length : 0));
                
                if (workflow.nodes && workflow.nodes.length > 0) {
                    const canvas = document.getElementById('workflow-canvas');
                    
                    workflow.nodes.forEach((nodeData, index) => {
                        log('Creating node: ' + nodeData.name);
                        
                        const nodeElement = document.createElement('div');
                        nodeElement.className = 'workflow-node';
                        nodeElement.style.left = nodeData.position.x + 'px';
                        nodeElement.style.top = nodeData.position.y + 'px';
                        nodeElement.innerHTML = `
                            <div class="node-header">${nodeData.name}</div>
                            <div class="node-body">Type: ${nodeData.type}</div>
                        `;
                        
                        canvas.appendChild(nodeElement);
                        log('✅ Node ' + (index + 1) + ' created');
                    });
                    
                    log('🏁 All nodes created! Canvas children: ' + canvas.children.length);
                } else {
                    log('❌ No nodes in workflow');
                }
            } catch (error) {
                log('❌ Error: ' + error.message);
            }
        }
        
        log('Debug page loaded successfully');
        log('Ready for testing...');
    </script>
</body>
</html>
